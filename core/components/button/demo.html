
<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Hangar Button Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="button.css">

</head>

<body class="container">

<h1>Hangar Button Component</h1>

<p>Primary Buttons</p>

<button class="h13-btn primary">
Save Repair Order
</button>

<button class="h13-btn success">
Complete
</button>

<button class="h13-btn warning">
Warning
</button>

<button class="h13-btn danger">
Delete
</button>

<button class="h13-btn outline">
Outline
</button>

<button class="h13-btn ghost">
Ghost
</button>

<hr>

<p>Sizes</p>

<button class="h13-btn primary small">

Small

</button>

<button class="h13-btn primary medium">

Medium

</button>

<button class="h13-btn primary large">

Large

</button>

<hr>

<p>Block Button</p>

<button class="h13-btn primary block">

Create Repair Order

</button>
