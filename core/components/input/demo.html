
<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Input Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="../button/button.css">
<link rel="stylesheet" href="input.css">

</head>

<body class="container">

<h1>Hangar 13 Input Component</h1>

<div class="h13-input-group">

<label class="h13-label">

Customer Name
<span class="h13-required">*</span>

</label>

<input
class="h13-input"
type="text"
placeholder="Enter customer name">

<div class="h13-helper">

Required

</div>

</div>

<div class="h13-input-group">

<label class="h13-label">

VIN

</label>

<input

class="h13-input"

type="text"

placeholder="17-digit VIN">

</div>

<div class="h13-input-group">

<label class="h13-label">

Mileage

</label>

<input

class="h13-input"

type="number"

placeholder="Mileage">

</div>

<button class="h13-btn primary">

Save

</button>

<script src="input.js"></script>

</body>

</html>
