<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Badge Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="badge.css">

</head>


<body class="container">


<h1>Hangar 13 Badge Component</h1>


<h3>Status</h3>


<span class="h13-badge success">

Completed

</span>


<span class="h13-badge warning">

Waiting Parts

</span>


<span class="h13-badge danger">

Urgent

</span>


<span class="h13-badge primary">

In Progress

</span>



<h3>Vehicle Status</h3>


<span class="h13-badge dot success">

Online

</span>


<span class="h13-badge dot danger">

Offline

</span>



<h3>Sizes</h3>


<span class="h13-badge small primary">

Small

</span>


<span class="h13-badge large primary">

Large

</span>



<h3>Outline</h3>


<span class="h13-badge outline success">

Paid

</span>


</body>

</html>
