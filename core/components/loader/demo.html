<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Loader Demo</title>


<link rel="stylesheet" href="../../design/styles/variables.css">

<link rel="stylesheet" href="../../design/styles/colors.css">

<link rel="stylesheet" href="../../design/styles/theme.css">


<link rel="stylesheet" href="loader.css">


</head>


<body class="container">


<h1>Hangar 13 Loader</h1>



<h3>Spinner</h3>


<div class="h13-loader">

<div class="h13-spinner"></div>

</div>



<div class="h13-loader">

<div class="h13-spinner lg"></div>

</div>



<h3>Dots</h3>


<div class="h13-dots">

<div class="h13-dot"></div>

<div class="h13-dot"></div>

<div class="h13-dot"></div>

</div>



<h3>Full Application Loading</h3>


<button onclick="startLoading()">

Simulate Loading

</button>



<script src="loader.js"></script>


<script>


const loader=new H13Loader();



function startLoading(){


    loader.show(
        "Loading Repair Order..."
    );


    setTimeout(()=>{


        loader.hide();


    },3000);


}


</script>


</body>

</html>
