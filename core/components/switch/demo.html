<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Switch Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="switch.css">

</head>

<body class="container">

<h1>Hangar Switch Component</h1>

<div class="h13-switch-group">

<label class="h13-switch">

<input
id="bayAvailable"
type="checkbox">

<span class="h13-slider"></span>

</label>

<label
for="bayAvailable"
class="h13-switch-label">

Bay Available

</label>

</div>

<div class="h13-switch-group">

<label class="h13-switch">

<input
id="techOnline"
type="checkbox"
checked>

<span class="h13-slider"></span>

</label>

<label
for="techOnline"
class="h13-switch-label">

Technician Online

</label>

</div>

<div class="h13-switch-group">

<label class="h13-switch">

<input
id="aiEnabled"
type="checkbox">

<span class="h13-slider"></span>

</label>

<label
for="aiEnabled"
class="h13-switch-label">

AI Enabled

</label>

</div>

<script src="switch.js"></script>

</body>

</html>
