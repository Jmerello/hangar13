<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Modal Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="../button/button.css">

<link rel="stylesheet" href="modal.css">

</head>

<body class="container">

<button
id="openButton"
class="h13-btn primary">

Open Modal

</button>

<div
id="repairModal"
class="h13-modal">

<div class="h13-modal-window">

<div class="h13-modal-header">

<div class="h13-modal-title">

Repair Order

</div>

<button
class="h13-modal-close">

×

</button>

</div>

<div class="h13-modal-body">

<h3>

Replace Front Brake Pads

</h3>

<p>

Estimated Labor

2.0 Hours

</p>

<p>

Parts

Brake Pads

Brake Cleaner

Brake Grease

</p>

</div>

<div class="h13-modal-footer">

<button
class="h13-btn">

Cancel

</button>

<button
class="h13-btn success">

Approve

</button>

</div>

</div>

</div>

<script src="modal.js"></script>

<script>

const modal=new H13Modal("repairModal");

document
.getElementById("openButton")
.onclick=()=>modal.open();

document
.querySelector(".h13-modal-close")
.onclick=()=>modal.close();

</script>

</body>

</html>
