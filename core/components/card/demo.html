
<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Hangar Card Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="../button/button.css">
<link rel="stylesheet" href="card.css">

</head>

<body class="container">

<h1>Hangar 13 Card Component</h1>

<div class="h13-card primary">

    <div class="h13-card-header">

        <div>

            <div class="h13-card-title">

                2018 Chevrolet Silverado

            </div>

            <div class="h13-card-subtitle">

                VIN 3GCUKREC0JG000001

            </div>

        </div>

        <button class="h13-btn primary">

            Edit

        </button>

    </div>

    <div class="h13-card-body">

        <p>

            Customer: John Smith

        </p>

        <p>

            Mileage: 132,551

        </p>

        <p>

            Status: Waiting On Parts

        </p>

    </div>

    <div class="h13-card-footer">

        <button class="h13-btn success">

            Open Repair Order

        </button>

    </div>

</div>

<script src="card.js"></script>

</body>

</html>
