<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Progress Demo</title>


<link rel="stylesheet" href="../../design/styles/variables.css">

<link rel="stylesheet" href="../../design/styles/colors.css">

<link rel="stylesheet" href="../../design/styles/theme.css">


<link rel="stylesheet" href="progress.css">


</head>


<body class="container">


<h1>Hangar 13 Progress Component</h1>



<div class="h13-progress-group">


<div class="h13-progress-header">


<span class="h13-progress-label">

Repair Completion

</span>


<span class="h13-progress-value">

65%

</span>


</div>



<div class="h13-progress">


<div

class="h13-progress-bar success"

style="width:65%">

</div>


</div>


</div>




<div class="h13-progress-group">


<div class="h13-progress-header">


<span class="h13-progress-label">

Parts Availability

</span>


<span class="h13-progress-value">

40%

</span>


</div>


<div class="h13-progress">


<div

class="h13-progress-bar warning"

style="width:40%">

</div>


</div>


</div>




<div class="h13-progress-group">


<div class="h13-progress-header">


<span class="h13-progress-label">

AI Vehicle Health Score

</span>


<span class="h13-progress-value">

92%

</span>


</div>



<div class="h13-progress lg">


<div

class="h13-progress-bar animated"

style="width:92%">

</div>


</div>


</div>




<script src="progress.js"></script>


</body>

</html>
