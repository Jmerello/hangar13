<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Checkbox Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="checkbox.css">

</head>

<body class="container">

<h1>Hangar Checkbox</h1>

<div class="h13-checkbox-group">

<input

type="checkbox"

id="oil"

class="h13-checkbox">

<label

for="oil"

class="h13-checkbox-label">

Oil Changed

</label>

</div>

<div class="h13-checkbox-group">

<input

type="checkbox"

id="rotate"

class="h13-checkbox success"

checked>

<label

for="rotate"

class="h13-checkbox-label">

Tires Rotated

</label>

</div>

<div class="h13-checkbox-group">

<input

type="checkbox"

id="inspect"

class="h13-checkbox warning">

<label

for="inspect"

class="h13-checkbox-label">

Inspection Complete

</label>

</div>

<div class="h13-checkbox-group">

<input

type="checkbox"

id="delete"

class="h13-checkbox danger">

<label

for="delete"

class="h13-checkbox-label">

Delete Vehicle

</label>

</div>

<script src="checkbox.js"></script>

</body>

</html>
