<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Select Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="select.css">

</head>

<body class="container">

<h1>Searchable Select</h1>

<div
id="customerSelect"
class="h13-select">

<label class="h13-select-label">

Customer

</label>

<input

class="h13-select-search"

placeholder="Search customer...">

<div class="h13-select-list">

<div class="h13-option">

John Merello

</div>

<div class="h13-option">

Jane Smith

</div>

<div class="h13-option">

Mike Johnson

</div>

<div class="h13-option">

Sarah Davis

</div>

<div class="h13-option">

Fleet Account 001

</div>

</div>

</div>

<script src="select.js"></script>

<script>

new H13Select("customerSelect");

</script>

</body>

</html>
