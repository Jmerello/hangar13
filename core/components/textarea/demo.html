<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Textarea Demo</title>

<link rel="stylesheet" href="../../design/styles/variables.css">
<link rel="stylesheet" href="../../design/styles/colors.css">
<link rel="stylesheet" href="../../design/styles/typography.css">
<link rel="stylesheet" href="../../design/styles/theme.css">

<link rel="stylesheet" href="textarea.css">

</head>

<body class="container">

<h1>Textarea Component</h1>

<div class="h13-textarea-group">

<label class="h13-textarea-label">

Customer Complaint

</label>

<textarea

id="notes"

class="h13-textarea"

placeholder="Describe the customer's concern..."

oninput="H13Textarea.autoResize(this);H13Textarea.characterCounter(this,document.getElementById('count'),500);"

></textarea>

<div

id="count"

class="h13-character-count"

>

0 / 500

</div>

</div>

<script src="textarea.js"></script>

</body>

</html>
