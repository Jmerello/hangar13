<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Data Grid Demo</title>


<link rel="stylesheet" href="../../design/styles/variables.css">

<link rel="stylesheet" href="../../design/styles/colors.css">

<link rel="stylesheet" href="../../design/styles/theme.css">


<link rel="stylesheet" href="data-grid.css">


</head>


<body class="container">


<h1>

Hangar 13 Data Grid

</h1>



<div class="h13-grid-container">



<div class="h13-grid-toolbar">


<input

class="h13-grid-search"

placeholder="Search customers...">


</div>




<table class="h13-grid">


<thead>

<tr>


<th>

Customer

</th>


<th>

Vehicle

</th>


<th>

VIN

</th>


<th>

Last Service

</th>


<th>

Balance

</th>


</tr>

</thead>



<tbody>


</tbody>


</table>



<div class="h13-grid-pagination">


<div class="h13-grid-page active">

1

</div>


<div class="h13-grid-page">

2

</div>


<div class="h13-grid-page">

3

</div>


</div>



</div>




<script src="data-grid.js"></script>



<script>


const customers=[


[

"John Smith",

"Silverado",

"1GC...123",

"07/20/26",

"$450"

],


[

"Sarah Jones",

"Bronco",

"1FM...456",

"07/15/26",

"$0"

],


[

"Fleet Account",

"F250",

"1FT...789",

"07/01/26",

"$2200"

],


[

"Mike Brown",

"Jeep Wrangler",

"1J4...555",

"06/28/26",

"$120"

]


];





new H13DataGrid(

document.querySelector(
".h13-grid-container"
),

customers

);


</script>


</body>

</html>
